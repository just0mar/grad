# Local backend-only development stack. For the three-machine production topology,
# use the Compose files and walkthrough under deploy/.
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5122:5122"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5122
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=equ;Username=postgres;Password=123123
      Email__SmtpHost: ${SMTP_HOST:-smtp.gmail.com}
      Email__SmtpPort: ${SMTP_PORT:-587}
      Email__SenderEmail: ${SMTP_SENDER_EMAIL:-}
      Email__SenderName: ${SMTP_SENDER_NAME:-Equipex}
      Email__Password: ${SMTP_PASSWORD:-}
    depends_on:
      - db

  db:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: equ
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123123
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
