name: sports-platform-chatbot

x-chatbot-environment: &chatbot-environment
  APP_ENV: production
  GROQ_API_KEY: ${GROQ_API_KEY:?Set GROQ_API_KEY in deploy/chatbot/.env}
  GROQ_MODEL: ${GROQ_MODEL:?Set GROQ_MODEL in deploy/chatbot/.env}
  GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
  GROQ_TIMEOUT: ${GROQ_TIMEOUT:-60}
  FAST_ANALYTICS_BYPASS: ${FAST_ANALYTICS_BYPASS:-0}
  ENABLE_ANALYTICS_LLM_FORMATTING: ${ENABLE_ANALYTICS_LLM_FORMATTING:-0}
  APP_API_BASE_URL: ${BACKEND_BASE_URL:?Set BACKEND_BASE_URL to the backend machine URL}
  APP_API_TIMEOUT: ${APP_API_TIMEOUT:-8}
  APP_API_TIMEOUT_INTERACTIVE: ${APP_API_TIMEOUT_INTERACTIVE:-3}
  MICROSERVICE_SERVICE_TOKEN: ${BACKEND_CHATBOT_SERVICE_TOKEN:?Set the shared backend/chatbot token}
  REQUIRE_SERVICE_TOKEN: "1"
  PREDICTION_SERVICE_BASE_URL: ${PREDICTION_BASE_URL:?Set PREDICTION_BASE_URL to the prediction machine URL}
  PREDICTION_SERVICE_TOKEN: ${CHATBOT_PREDICTION_SERVICE_TOKEN:?Set the shared chatbot/prediction token}
  PREDICTION_SERVICE_TIMEOUT: ${PREDICTION_SERVICE_TIMEOUT:-900}
  WEBHOOK_PULL_TIMEOUT: ${WEBHOOK_PULL_TIMEOUT:-60}
  QUEUE_BACKEND: celery
  CACHE_BACKEND: redis
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  WARM_MODELS_ON_STARTUP: ${WARM_MODELS_ON_STARTUP:-1}

services:
  redis:
    image: redis:7-alpine
    volumes:
      - chatbot_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  chatbot-api:
    build:
      context: "../../SportsPlatform.Auth.Api/scripts/final chatbot"
      dockerfile: Dockerfile
    ports:
      - "${CHATBOT_BIND_ADDRESS:-0.0.0.0}:${CHATBOT_PORT:-8000}:8000"
    environment: *chatbot-environment
    volumes:
      - chatbot_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:8000/ready"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped

  chatbot-worker:
    build:
      context: "../../SportsPlatform.Auth.Api/scripts/final chatbot"
      dockerfile: Dockerfile
    command: celery -A worker.celery_app worker --loglevel=info --concurrency=${CELERY_WORKER_CONCURRENCY:-4}
    environment: *chatbot-environment
    volumes:
      - chatbot_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  chatbot_data:
  chatbot_redis_data:
