name: sports-platform-prediction

services:
  prediction-api:
    build:
      context: ../../SportsPlatform.Auth.Api/scripts
      dockerfile: prediction_service/Dockerfile
    ports:
      - "${PREDICTION_BIND_ADDRESS:-0.0.0.0}:${PREDICTION_PORT:-8101}:8101"
    environment:
      PREDICTION_SERVICE_TOKEN: ${CHATBOT_PREDICTION_SERVICE_TOKEN:?Set the shared chatbot/prediction token}
      BACKEND_BASE_URL: ${BACKEND_BASE_URL:?Set BACKEND_BASE_URL to the backend machine URL}
      BACKEND_SERVICE_TOKEN: ${BACKEND_CHATBOT_SERVICE_TOKEN:?Set the backend service token used to pull PDFs}
      BACKEND_PULL_TIMEOUT: ${BACKEND_PULL_TIMEOUT:-60}
      MAX_PDF_BYTES: ${MAX_PDF_BYTES:-52428800}
      MAX_CONCURRENT_TRAININGS: ${MAX_CONCURRENT_TRAININGS:-1}
      PREDICTION_DATA_ROOT: /data/teams
      FIBA_PROJECT_DIR: /app/fiba_clean_project
    volumes:
      - prediction_data:/data/teams
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8101/ready', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

volumes:
  prediction_data:
