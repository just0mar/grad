name: sports-platform-backend

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-equ}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in deploy/backend/.env}
    volumes:
      - backend_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  stats-extractor:
    build:
      context: ../../SportsPlatform.Auth.Api/scripts
      dockerfile: Dockerfile.stats-extractor
    expose:
      - "8100"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ../..
      dockerfile: Dockerfile
    ports:
      - "${API_BIND_ADDRESS:-0.0.0.0}:${API_PORT:-5122}:5122"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5122
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=${POSTGRES_DB:-equ};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD}
      Jwt__Secret: ${JWT_SECRET:?Set JWT_SECRET in deploy/backend/.env}
      Jwt__Issuer: ${JWT_ISSUER:-SportsPlatform.Auth}
      Jwt__Audience: ${JWT_AUDIENCE:-SportsPlatform.Client}
      Jwt__ExpiresInMinutes: ${JWT_EXPIRES_IN_MINUTES:-15}
      Jwt__RefreshTokenExpiryDays: ${JWT_REFRESH_TOKEN_EXPIRY_DAYS:-7}
      Google__ClientId: ${GOOGLE_CLIENT_ID:-PLACEHOLDER_CLIENT_ID}
      Google__ClientSecret: ${GOOGLE_CLIENT_SECRET:-PLACEHOLDER_CLIENT_SECRET}
      Google__CallbackPath: ${GOOGLE_CALLBACK_PATH:-/auth/google/callback}
      Email__SmtpHost: ${SMTP_HOST:-smtp.gmail.com}
      Email__SmtpPort: ${SMTP_PORT:-587}
      Email__SenderEmail: ${SMTP_SENDER_EMAIL:-}
      Email__SenderName: ${SMTP_SENDER_NAME:-Equipex}
      Email__Password: ${SMTP_PASSWORD:-}
      StatsExtractor__BaseUrl: http://stats-extractor:8100
      Microservice__Enabled: "true"
      Microservice__BaseUrl: ${CHATBOT_BASE_URL:?Set CHATBOT_BASE_URL to the chatbot machine URL}
      Microservice__PublicBaseUrl: ${BACKEND_PUBLIC_BASE_URL:?Set BACKEND_PUBLIC_BASE_URL to a URL reachable by the Python machines}
      Microservice__ServiceToken: ${BACKEND_CHATBOT_SERVICE_TOKEN:?Set the shared backend/chatbot token}
    volumes:
      - backend_uploads:/app/wwwroot/uploads
      - backend_data_protection_keys:/app/.keys
    depends_on:
      db:
        condition: service_healthy
      stats-extractor:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend_postgres_data:
  backend_uploads:
  backend_data_protection_keys:
