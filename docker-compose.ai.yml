version: '3.8'

services:
  prediction_model:
    build:
      context: .
      dockerfile: fiba_clean_project/prediction_service/Dockerfile
    container_name: equipex_prediction_model
    # The container internally uses 8101
    expose:
      - "8101"
    networks:
      - ai_network

  chatbot_service:
    build:
      context: ./final chatbot
      dockerfile: Dockerfile
    container_name: equipex_chatbot_service
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=llama-3.3-70b-versatile
      - APP_API_BASE_URL=http://34.154.188.123:5000
      - MICROSERVICE_SERVICE_TOKEN=equipex-local-dev-service-token-2026
      - REQUIRE_SERVICE_TOKEN=0
      - PREDICTION_SERVICE_BASE_URL=http://prediction_model:8101
      - PREDICTION_SERVICE_TOKEN=put_the_prediction_service_token_here
    ports:
      - "8000:8000"
    depends_on:
      - prediction_model
    networks:
      - ai_network

networks:
  ai_network:
    driver: bridge
