<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipex - Join the Team</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 500px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        p {
            color: #94a3b8;
            font-size: 18px;
            line-height: 1.5;
            margin-bottom: 30px;
        }
        .logo {
            font-size: 48px;
            font-weight: bold;
            color: #4CAF50;
            margin-bottom: 20px;
        }
        .button {
            display: inline-block;
            background-color: #4CAF50;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            transition: background-color 0.3s, transform 0.2s;
            margin: 10px;
        }
        .button:hover {
            background-color: #45a049;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Equipex</div>
        <h1>You've been invited!</h1>
        <p>You need the Equipex app to accept your invitation and join the team. If you are seeing this page, please download the app from the store below.</p>
        <p>After installing, return to your email and tap the invitation button again.</p>
        <a href="#" class="button">Download for Android</a>
        <a href="#" class="button">Download for iOS</a>
    </div>
</body>
</html>
